services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: refurbhub
      POSTGRES_PASSWORD: refurbhub
      POSTGRES_DB: refurbhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refurbhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      REFURBHUB_DATABASE_URL: postgresql+asyncpg://refurbhub:refurbhub@postgres:5432/refurbhub
      REFURBHUB_REDIS_URL: redis://redis:6379/0
      REFURBHUB_CELERY_BROKER_URL: redis://redis:6379/1
      REFURBHUB_CELERY_RESULT_BACKEND: redis://redis:6379/2
      REFURBHUB_CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
      REFURBHUB_SECRET_KEY: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      REFURBHUB_DATABASE_URL: postgresql+asyncpg://refurbhub:refurbhub@postgres:5432/refurbhub
      REFURBHUB_REDIS_URL: redis://redis:6379/0
      REFURBHUB_CELERY_BROKER_URL: redis://redis:6379/1
      REFURBHUB_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker --loglevel=info --pool=solo

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      REFURBHUB_DATABASE_URL: postgresql+asyncpg://refurbhub:refurbhub@postgres:5432/refurbhub
      REFURBHUB_REDIS_URL: redis://redis:6379/0
      REFURBHUB_CELERY_BROKER_URL: redis://redis:6379/1
      REFURBHUB_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks beat --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
